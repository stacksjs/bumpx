name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.1.0
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Publish
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: stacksjs/action-releaser@cc6cd61791cf7556459ca35ad536800561277e3e # v1.2.11
        with:
          files: |
            packages/bumpx/bin/bumpx-linux-x64.zip
            packages/bumpx/bin/bumpx-linux-arm64.zip
            packages/bumpx/bin/bumpx-windows-x64.zip
            packages/bumpx/bin/bumpx-darwin-x64.zip
            packages/bumpx/bin/bumpx-darwin-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
